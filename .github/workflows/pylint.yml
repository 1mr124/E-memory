name: Backend - Pylint Quality Check

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
      - develop

jobs:
  pylint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Pylint on current branch
        id: pylint_current
        run: |
          pylint_output=$(pylint . --enable=W --disable=C0103 2>&1 || true)
          echo "$pylint_output" > pylint_output.txt
          current_score=$(echo "$pylint_output" | grep "Your code has been rated" | tail -1 | grep -oP '(?<=rated )\d+\.\d+')
          echo "current_score=${current_score:-0}" >> $GITHUB_ENV
          echo "Pylint score on current branch: ${current_score:-0}"

      - name: Checkout main branch
        run: |
          git checkout origin/main

      - name: Run Pylint on main branch
        id: pylint_main
        run: |
          pylint_output=$(pylint . --enable=W --disable=C0103 2>&1 || true)
          echo "$pylint_output" > pylint_output_main.txt
          main_score=$(echo "$pylint_output" | grep "Your code has been rated" | tail -1 | grep -oP '(?<=rated )\d+\.\d+')
          echo "main_score=${main_score:-0}" >> $GITHUB_ENV
          echo "Pylint score on main branch: ${main_score:-0}"

      - name: Compare Pylint scores
        run: |
          echo "Current branch Pylint score: ${{ env.current_score }}"
          echo "Main branch Pylint score: ${{ env.main_score }}"
          if (( $(echo "${{ env.current_score }} < ${{ env.main_score }}" | bc -l 2>/dev/null || echo "0") )); then
            echo "::error::Pylint score decreased from ${{ env.main_score }} to ${{ env.current_score }}!"
            exit 1
          else
            echo "Pylint score is good or has improved."
          fi

      - name: Upload Pylint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pylint-reports
          path: |
            pylint_output.txt
            pylint_output_main.txt
          retention-days: 7
