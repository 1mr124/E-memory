name: Backend - Pylint Quality Check

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'FlaskSite/**'
      - 'requirements.txt'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'FlaskSite/**'
      - 'requirements.txt'

jobs:
  pylint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Pylint
        id: pylint_run
        run: |
          set +e
          pylint FlaskSite/ --enable=W --disable=C0103 --ignore=tests --ignore=migrations 2>&1 | tee pylint_output.txt
          pylint_exit_code=$?
          set -e
          score=$(grep "Your code has been rated" pylint_output.txt | tail -1 | awk '{print $7}' | sed 's/\/.*//')
          echo "score=${score:-0}" >> $GITHUB_ENV
          echo "Pylint score: ${score:-0}"

      - name: Compare with main (for PRs)
        if: github.event_name == 'pull_request'
        run: |
          git checkout origin/main
          set +e
          pylint FlaskSite/ --enable=W --disable=C0103 --ignore=tests --ignore=migrations 2>&1 | tee pylint_output_main.txt
          set -e
          main_score=$(grep "Your code has been rated" pylint_output_main.txt | tail -1 | awk '{print $7}' | sed 's/\/.*//')
          echo "main_score=${main_score:-0}" >> $GITHUB_ENV
          python3 -c "
              import sys
              current = float('${{ env.score }}')
              main = float('${{ env.main_score }}')
              if current < main:
                  print(f'Pylint score decreased from {main} to {current}!')
                  sys.exit(1)
              else:
                  print('Pylint score is good or has improved.')
          "

      - name: Upload Pylint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pylint-reports
          path: |
            pylint_output.txt
            pylint_output_main.txt
          retention-days: 7
