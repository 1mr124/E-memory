name: Update Pylint Score

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if score unchanged'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update_score:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Pylint
        id: pylint_run
        run: |
          set +e
          pylint FlaskSite/ --enable=W --disable=C0103 --ignore=tests --ignore=migrations 2>&1 | tee pylint_output.txt
          pylint_exit_code=$?
          set -e
          score=$(grep "Your code has been rated" pylint_output.txt | tail -1 | awk '{print $7}' | sed 's/\/.*//')
          echo "score=${score:-0}" >> $GITHUB_ENV
          echo "Pylint score: ${score:-0}"

      - name: Update README with new score
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          old_score=$(grep -oP '(?<=Pylint Status badge for score )\d+\.\d+' README.md || echo "0")
          
          if [[ "${{ env.score }}" != "$old_score" ]] || [[ "${{ inputs.force_update }}" == "true" ]]; then
            sed -i "s/Pylint Status badge for score [0-9.]*/Pylint Status badge for score ${{ env.score }}/g" README.md
            git add README.md
            
            echo "Old score: $old_score"
            echo "New score: ${{ env.score }}"
            
            if ! git diff-index --quiet HEAD --; then
              git commit -m "chore: update pylint score from $old_score to ${{ env.score }}"
              git push origin main
              echo "✓ Successfully updated pylint score in README"
            else
              echo "No changes detected in README"
            fi
          else
            echo "Score unchanged (${{ env.score }}), skipping update"
          fi

      - name: Clean up
        if: always()
        run: |
          rm -f pylint_output.txt
